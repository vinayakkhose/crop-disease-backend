services:
  - type: web
    name: crop-disease-backend
    env: python
    plan: starter          # Free tier won't fit TensorFlow (needs ~1GB RAM)
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false        # Set this manually in Render dashboard (keep secret)
      - key: DATABASE_NAME
        value: crop_disease_db
      - key: SECRET_KEY
        sync: false        # Set this manually in Render dashboard (keep secret)
      - key: FRONTEND_ORIGIN
        sync: false        # Set to your deployed frontend URL e.g. https://your-app.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
